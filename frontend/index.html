<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinGuard Copilot</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <div class="editor">
          <header>
            <div>
              <p class="eyebrow">SupportOps Copilot</p>
              <h1>FinGuard Copilot</h1>
            </div>
            <select id="sampleSelect" class="styled-select" aria-label="Load sample ticket">
              <option value="wrong_transfer">Sample: Wrong Transfer</option>
              <option value="phishing">Sample: Phishing</option>
              <option value="duplicate">Sample: Duplicate Payment</option>
            </select>
          </header>
          <textarea id="ticketInput" spellcheck="false" aria-label="Ticket JSON input"></textarea>
          <div class="actions">
            <button id="analyzeBtn" type="button">Analyze ticket</button>
            <span id="status" role="status"></span>
          </div>
        </div>

        <div class="results" aria-live="polite">
          <div class="result-topline">
            <div>
              <p class="eyebrow">Verdict</p>
              <h2 id="caseType">Awaiting ticket</h2>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
              <button id="downloadBtn" type="button" style="display: none; background: var(--muted); padding: 6px 12px; font-size: 13px;">Download</button>
              <span id="severity" class="badge">-</span>
            </div>
          </div>
          <dl class="facts">
            <div>
              <dt>Evidence</dt>
              <dd id="evidence">-</dd>
            </div>
            <div>
              <dt>Department</dt>
              <dd id="department">-</dd>
            </div>
            <div>
              <dt>Transaction</dt>
              <dd id="transaction">-</dd>
            </div>
            <div>
              <dt>Human Review</dt>
              <dd id="review">-</dd>
            </div>
          </dl>
          <div id="textualResults" style="display: none;">
            <div class="card summary-card">
              <dt>Agent Summary</dt>
              <dd id="agentSummary">-</dd>
            </div>
            <div class="card action-card">
              <dt>Recommended Next Action</dt>
              <dd id="nextAction">-</dd>
            </div>
            <div class="card reply-card">
              <dt>Customer Reply</dt>
              <dd id="customerReply">-</dd>
            </div>
            
            <div class="card" style="margin-top: 24px; border-left-color: var(--ink);">
              <dt>System Analytics (Lifetime)</dt>
              <div style="height: 220px; position: relative;">
                <canvas id="analyticsChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
